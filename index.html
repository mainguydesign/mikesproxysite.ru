<!DOCTYPE html>
<html>
<head>
    <title>Portal</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: black;
            color: white;
        }

        #lockscreen, #lockedScreen, #overrideScreen {
            position: fixed;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #lockscreen {
            display: flex;
        }

        #lockedScreen {
            background: darkred;
        }

        #overrideScreen {
            background: #c8facc;
            color: #0a3d1a;
            font-size: 24px;
        }

        #recoveryBox {
            position: fixed;
            bottom: 10px;
            right: 10px;
            display: none;
        }

        #main {
            display: none;
            padding: 20px;
            background: #111;
            min-height: 100vh;
        }

        #search {
            padding: 10px;
            width: 300px;
            margin-bottom: 20px;
        }

        .link-item {
            display: block;
            color: lightblue;
            margin: 5px 0;
        }

        .hidden { display: none; }
        .highlight { background: yellow; color: black; }
    </style>
</head>

<body>

<div id="lockscreen">
    <input id="password" placeholder="Enter password">
    <div id="message"></div>
</div>

<div id="lockedScreen">
    <div>ACCESS DENIED</div>
    <div>FOR 10 MINUTES</div>
    <div id="timer"></div>
</div>

<div id="recoveryBox">
    <input id="recoveryPassword" placeholder="recovery...">
</div>

<div id="overrideScreen">
    DEFENSE MECHANISM DEACTIVATED
</div>

<div id="main">
    <input id="search" placeholder="Search...">

    <a class="link-item">Minecraft</a>
    <a class="link-item">Roblox</a>
    <a class="link-item">Terraria</a>
</div>

<script>
const correctPassword = "superiorsiteowner";
const recoveryPassword = "superiorlakeemerald";

const maxAttempts = 5;
const lockTime = 10 * 60 * 1000;

let attempts = Number(localStorage.getItem("attempts")) || 0;
let lockUntil = Number(localStorage.getItem("lockUntil")) || 0;

let lockInterval = null;

const lockscreen = document.getElementById("lockscreen");
const lockedScreen = document.getElementById("lockedScreen");
const overrideScreen = document.getElementById("overrideScreen");
const recoveryBox = document.getElementById("recoveryBox");
const timer = document.getElementById("timer");
const msg = document.getElementById("message");

/* 🔒 LOCK SYSTEM */
function startLock() {

    clearInterval(lockInterval);

    lockscreen.style.display = "none";
    lockedScreen.style.display = "flex";
    recoveryBox.style.display = "block";

    lockInterval = setInterval(() => {
        let remaining = lockUntil - Date.now();

        if (remaining <= 0) {
            clearInterval(lockInterval);
            unlockSystem();
            return;
        }

        timer.textContent = "Time remaining: " + Math.ceil(remaining / 1000) + "s";

    }, 1000);
}

function unlockSystem() {
    clearInterval(lockInterval);

    lockUntil = 0;
    attempts = 0;

    localStorage.removeItem("lockUntil");
    localStorage.removeItem("attempts");

    lockedScreen.style.display = "none";
    recoveryBox.style.display = "none";
    lockscreen.style.display = "flex";
}

/* 🔑 LOGIN */
document.getElementById("password").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {

        if (Date.now() < lockUntil) {
            startLock();
            return;
        }

        if (this.value === correctPassword) {
            attempts = 0;
            localStorage.setItem("attempts", 0);

            lockscreen.style.display = "none";
            document.getElementById("main").style.display = "block";
        } else {
            attempts++;
            localStorage.setItem("attempts", attempts);

            if (attempts >= maxAttempts) {
                lockUntil = Date.now() + lockTime;
                localStorage.setItem("lockUntil", lockUntil);
                startLock();
            } else {
                msg.textContent = "Wrong password (" + attempts + "/" + maxAttempts + ")";
            }

            this.value = "";
        }
    }
});

/* 🟢 RECOVERY (FULL FIX) */
document.getElementById("recoveryPassword").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {

        if (this.value === recoveryPassword) {

            // 🔥 COMPLETE STOP
            clearInterval(lockInterval);

            lockUntil = 0;
            attempts = 0;

            localStorage.removeItem("lockUntil");
            localStorage.removeItem("attempts");

            lockedScreen.style.display = "none";
            recoveryBox.style.display = "none";

            overrideScreen.style.display = "flex";

            setTimeout(() => {
                overrideScreen.style.display = "none";
                lockscreen.style.display = "flex";
            }, 10000);

        }

        this.value = "";
    }
});

/* 🔍 SEARCH */
document.getElementById("search").addEventListener("input", function() {
    let value = this.value.toLowerCase();
    let links = document.querySelectorAll(".link-item");

    links.forEach(link => {
        let text = link.textContent;

        if (!value) {
            link.innerHTML = text;
            link.classList.remove("hidden");
            return;
        }

        let lower = text.toLowerCase();

        if (lower.includes(value)) {
            link.classList.remove("hidden");

            let i = lower.indexOf(value);

            link.innerHTML =
                text.substring(0, i) +
                "<span class='highlight'>" +
                text.substring(i, i + value.length) +
                "</span>" +
                text.substring(i + value.length);
        } else {
            link.classList.add("hidden");
        }
    });
});
</script>

</body>
</html>
