<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal OS</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:black;
    color:white;
}

/* SCREENS */
#lockscreen,#lockedScreen,#overrideScreen {
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

#lockedScreen { background:darkred; display:none; }
#overrideScreen { background:#c8facc; color:#0a3d1a; display:none; }

/* DESKTOP */
#desktop {
    display:none;
    height:100vh;
    background:#0d0d0d;
    padding:20px;
}

.icon {
    width:80px;
    text-align:center;
    margin:10px;
    cursor:pointer;
    display:inline-block;
}

.icon div {
    font-size:40px;
}

.window {
    position:absolute;
    top:100px;
    left:100px;
    width:300px;
    background:#222;
    border:1px solid #555;
    display:none;
}

.window-header {
    background:#333;
    padding:5px;
    cursor:move;
}

.close-btn {
    float:right;
    cursor:pointer;
}

/* SEARCH */
#search {
    width:100%;
    padding:8px;
    margin-bottom:10px;
}

.link-item { display:block; color:lightblue; }
.hidden { display:none; }
.highlight { background:yellow; color:black; }

/* RECOVERY BOX */
#recoveryBox {
    position:fixed;
    bottom:10px;
    right:10px;
    display:none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="lockscreen">
    <input id="password" placeholder="Enter password">
    <div id="message"></div>
</div>

<!-- LOCK -->
<div id="lockedScreen">
    <div>ACCESS DENIED</div>
    <div id="timer"></div>
</div>

<!-- RECOVERY -->
<div id="recoveryBox">
    <input id="recoveryPassword" placeholder="recovery">
</div>

<!-- OVERRIDE -->
<div id="overrideScreen">
    DEFENSE MECHANISM DEACTIVATED
</div>

<!-- DESKTOP -->
<div id="desktop">

    <div class="icon" onclick="openWindow('gamesWindow')">
        <div>🎮</div>
        Games
    </div>

</div>

<!-- GAMES WINDOW -->
<div class="window" id="gamesWindow">
    <div class="window-header">
        Games
        <span class="close-btn" onclick="closeWindow('gamesWindow')">X</span>
    </div>

    <input id="search" placeholder="Search">

    <a class="link-item">Minecraft</a>
    <a class="link-item">Roblox</a>
    <a class="link-item">Terraria</a>
</div>

<script>
const correctPassword="superiorsiteowner";
const recoveryPassword="superiorlakeemerald";

let attempts=0;
let lockUntil=0;
let lockInterval;

/* LOGIN */
document.getElementById("password").addEventListener("keydown",e=>{
if(e.key==="Enter"){
if(Date.now()<lockUntil){startLock();return;}

if(e.target.value===correctPassword){
document.getElementById("lockscreen").style.display="none";
document.getElementById("desktop").style.display="block";
}else{
attempts++;
if(attempts>=5){
lockUntil=Date.now()+600000;
startLock();
}else{
document.getElementById("message").innerText="Wrong ("+attempts+"/5)";
}
}
e.target.value="";
}
});

/* LOCK */
function startLock(){
clearInterval(lockInterval);
document.getElementById("lockscreen").style.display="none";
document.getElementById("lockedScreen").style.display="flex";
document.getElementById("recoveryBox").style.display="block";

lockInterval=setInterval(()=>{
let remaining=lockUntil-Date.now();
if(remaining<=0){unlock();return;}
document.getElementById("timer").innerText=Math.ceil(remaining/1000)+"s";
},1000);
}

function unlock(){
clearInterval(lockInterval);
lockUntil=0;
attempts=0;
document.getElementById("lockedScreen").style.display="none";
document.getElementById("recoveryBox").style.display="none";
document.getElementById("lockscreen").style.display="flex";
}

/* RECOVERY */
document.getElementById("recoveryPassword").addEventListener("keydown",e=>{
if(e.key==="Enter"){
if(e.target.value===recoveryPassword){
clearInterval(lockInterval);
unlock();

document.getElementById("overrideScreen").style.display="flex";

setTimeout(()=>{
document.getElementById("overrideScreen").style.display="none";
},10000);
}
e.target.value="";
}
});

/* WINDOWS */
function openWindow(id){
document.getElementById(id).style.display="block";
}
function closeWindow(id){
document.getElementById(id).style.display="none";
}

/* SEARCH */
document.getElementById("search").addEventListener("input",function(){
let v=this.value.toLowerCase();
document.querySelectorAll(".link-item").forEach(link=>{
let t=link.textContent;
if(!v){link.innerHTML=t;link.classList.remove("hidden");return;}

let l=t.toLowerCase();
if(l.includes(v)){
let i=l.indexOf(v);
link.innerHTML=t.substring(0,i)+"<span class='highlight'>"+
t.substring(i,i+v.length)+"</span>"+t.substring(i+v.length);
link.classList.remove("hidden");
}else link.classList.add("hidden");
});
});
</script>

</body>
</html>
